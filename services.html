<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BoothHub - Manage Services</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <header class="top-header">
        <div class="header-left"><img src="logo.png" class="header-logo"></div>
        <div class="header-right">
            <div class="search-box"><i class="fa fa-search"></i><input type="text" placeholder="Search..."></div>
            <div class="icon-actions"><i class="fa fa-bell"></i><i class="fa fa-gear"></i><div class="profile-circle">JA</div></div>
        </div>
    </header>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-brand"><h2>BoothHub</h2><p>Admin Portal</p></div>
            <ul class="nav-links">
                <li><a href="dashboard.html"><i class="fa fa-gauge"></i> Dashboard</a></li>
                <li class="active"><a href="services.html"><i class="fa fa-gear"></i> Manage Services</a></li>
                <li><a href="orders.html"><i class="fa fa-calendar"></i> Manage Orders</a></li>
                <li><a href="booking.html"><i class="fa fa-check"></i> Booking Action</a></li>
            </ul>
            <div class="sidebar-footer-area">
                <button class="btn-new-booking" id="newBookingBtn">+ New Booking</button>
                <a href="index.html" class="logout-link">
                    <i class="fa fa-sign-out-alt"></i> Logout
                </a>            
            </div>
        </aside>
<main class="content-area">
    <section class="welcome-header">
        <h1>Manage Services</h1>
        <p>Manage and customize your booth services</p>
    </section>
    <div class="services-grid" id="servicesGrid">
        <article class="service-card">
            <img src="images/photo.jpg">
            <div class="service-info">
                <h3>Photography Booth</h3>
                <span class="price">2000 ريال</span>

                <div class="card-actions">
                    <button class="btn-edit">
                        <i class="fa fa-pen"></i> Edit
                    </button>
                    <button class="btn-delete">
                        <i class="fa fa-trash"></i>
                    </button>
                </div>
            </div>
        </article>

        <article class="service-card">
            <img src="images/coffee.jpg">

            <div class="service-info">
                <h3>Coffee Booth</h3>
                <span class="price">1500 ريال</span>

                <div class="card-actions">
                    <button class="btn-edit">
                        <i class="fa fa-pen"></i> Edit
                    </button>
                    <button class="btn-delete">
                        <i class="fa fa-trash"></i>
                    </button>
                </div>
            </div>
        </article>

        <div class="add-service-box" id="addServiceBtn">
            <div class="add-circle">
                <i class="fa fa-plus"></i>
            </div>
            <h3>Add New Service</h3>
        </div>

    </div>
</main>

      
    <footer class="main-footer">
        <p>📧 BoothHub@gmail.com | 📱 @boothhub_ksa | 📞 +966 53 680 1100</p>
    </footer>    <script src="script.js"></script>
</body>
</html>
