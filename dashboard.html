<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BoothHub - Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <header class="top-header">
        <div class="header-left">
            <img src="logo.png" alt="BoothHub" class="header-logo">
        </div>
        <div class="header-right">
            <div class="search-box">
                <i class="fa fa-search"></i>
                <input type="text" placeholder="Search...">
            </div>
            <div class="icon-actions">
                <i class="fa fa-bell"></i>
                <i class="fa fa-gear"></i>
                <div class="profile-circle">JA</div>
            </div>
        </div>
    </header>
        <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <h2>BoothHub</h2>
                <p>Admin Portal</p>
            </div>
            <ul class="nav-links">
                <li class="active"><a href="dashboard.html"><i class="fa fa-gauge"></i> Dashboard</a></li>
                <li><a href="services.html"><i class="fa fa-gear"></i> Manage Services</a></li>
                <li><a href="orders.html"><i class="fa fa-calendar"></i> Manage Orders</a></li>
                <li><a href="booking.html"><i class="fa fa-check"></i> Booking Action</a></li>
            </ul>
            <div class="sidebar-footer-area">
                <button class="btn-new-booking" id="newBookingBtn">+ New Booking</button>
                <a href="login.html" class="logout-link">
                    <i class="fa fa-sign-out-alt"></i> Logout
                </a>
                <p style="font-size: 0.7rem; color: #bbb;">@BoothHub. All rights reserved.</p>
            </div>
        </aside>
            <main class="content-area">
            <section class="welcome-header">
                <h1>Welcome, Dr. Nabeel</h1>
                <p>Summary of your event activity for today</p>
            </section>

            <div class="stats-grid">
                <div class="stat-card">
                    <p>TOTAL BOOKINGS</p>
                    <h2 class="stat-num">24</h2>
                </div>
                <div class="stat-card">
                    <p>NEW REQUESTS</p>
                    <h2 class="stat-num highlight">5</h2>
                </div>
                <div class="stat-card">
                    <p>ACCEPTED</p>
                    <h2 class="stat-num">15</h2>
                </div>
                <div class="stat-card next-booking">
                    <p>NEXT BOOKING</p>
                    <h2 class="stat-num">3 Days</h2>
                    <p style="font-size: 0.7rem;">Photography Booth</p>
                </div>
            </div>
</body>
